{% extends 'base.html' %}

{% block title %}Contact Us | CSE Department{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    
    <div class="text-center mb-12">
        <h1 class="text-4xl font-extrabold text-gray-900">Contact Us</h1>
        <p class="mt-4 text-lg text-gray-600">Get in touch with the Computer Science & Engineering department.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <div class="bg-white p-8 rounded-lg shadow-sm border border-gray-200 text-center flex flex-col items-center">
            <div class="bg-blue-100 p-4 rounded-full mb-4 text-blue-600">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            </div>
            <h3 class="text-xl font-bold text-gray-900 mb-2">Location</h3>
            <p class="text-gray-600 whitespace-pre-line">{{ info.address }}</p>
        </div>

        <div class="bg-white p-8 rounded-lg shadow-sm border border-gray-200 text-center flex flex-col items-center">
            <div class="bg-green-100 p-4 rounded-full mb-4 text-green-600">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
            </div>
            <h3 class="text-xl font-bold text-gray-900 mb-2">Phone</h3>
            <a href="tel:{{ info.contact_phone }}" class="text-blue-600 hover:underline text-lg">{{ info.contact_phone }}</a>
        </div>

        <div class="bg-white p-8 rounded-lg shadow-sm border border-gray-200 text-center flex flex-col items-center">
            <div class="bg-purple-100 p-4 rounded-full mb-4 text-purple-600">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
            </div>
            <h3 class="text-xl font-bold text-gray-900 mb-2">Email</h3>
            <a href="mailto:{{ info.contact_email }}" class="text-blue-600 hover:underline text-lg">{{ info.contact_email }}</a>
        </div>

    </div>
</div>
{% endblock %}

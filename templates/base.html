<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CSE Department{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { cseBlue: '#0f172a', cseAccent: '#3b82f6' }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen">

    <nav x-data="{ open: false }" class="bg-cseBlue text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="font-bold text-xl tracking-wider">CSE DEPT</a>
                </div>
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-4 text-sm font-medium">
                        <a href="/" class="hover:bg-gray-700 px-3 py-2 rounded-md">Home</a>
                        <a href="/about" class="hover:bg-gray-700 px-3 py-2 rounded-md">About</a>
                        <a href="/faculty" class="hover:bg-gray-700 px-3 py-2 rounded-md">Faculty</a>
                        <a href="/courses" class="hover:bg-gray-700 px-3 py-2 rounded-md">Courses</a>
                        <a href="/notices" class="hover:bg-gray-700 px-3 py-2 rounded-md">Notices</a>
                        <a href="/events" class="hover:bg-gray-700 px-3 py-2 rounded-md">Events</a>
                        <a href="/gallery" class="hover:bg-gray-700 px-3 py-2 rounded-md">Gallery</a> 
                    </div>
                </div>
                <div class="-mr-2 flex md:hidden">
                    <button @click="open = !open" class="inline-flex items-center justify-center p-2 rounded-md hover:bg-gray-700 focus:outline-none">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path x-show="!open" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                            <path x-show="open" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        <div x-show="open" class="md:hidden bg-gray-800">
            <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3 text-sm font-medium">
                <a href="/" class="block hover:bg-gray-700 px-3 py-2 rounded-md">Home</a>
                <a href="/faculty" class="block hover:bg-gray-700 px-3 py-2 rounded-md">Faculty</a>
                <a href="/notices" class="block hover:bg-gray-700 px-3 py-2 rounded-md">Notices</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow">
        {% block content %}{% endblock %}
    </main>
<div x-data="{ loginOpen: false }" @keydown.escape.window="loginOpen = false">
        <div class="fixed bottom-4 right-4 text-xs text-gray-400 hover:text-gray-700 cursor-pointer" @click="loginOpen = true">
            Admin Access
        </div>

        <div x-show="loginOpen" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50" x-cloak>
            <div @click.away="loginOpen = false" class="bg-white rounded-lg shadow-xl w-full max-w-md p-6 relative">
                <button @click="loginOpen = false" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
                <h2 class="text-2xl font-bold text-gray-900 mb-6">Admin Login</h2>
                <form action="/admin/login" method="POST" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Username</label>
                        <input type="text" name="username" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-cseAccent focus:border-cseAccent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Password</label>
                        <input type="password" name="password" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-cseAccent focus:border-cseAccent">
                    </div>
                    <button type="submit" class="w-full bg-cseAccent text-white py-2 px-4 rounded-md hover:bg-blue-600 transition">
                        Sign In
                    </button>
                </form>
            </div>
        </div>
    </div>
    <footer class="bg-gray-900 text-gray-400 py-8 text-center mt-12">
        <p>&copy; 2026 Department of Computer Science & Engineering. All rights reserved.</p>
    </footer>

</body>
</html>

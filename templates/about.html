{% extends 'base.html' %}

{% block title %}About Us | CSE Department{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    
    <div class="mb-16">
        <h1 class="text-4xl font-extrabold text-gray-900 mb-6 border-b pb-4">About the Department</h1>
        <p class="text-lg text-gray-700 leading-relaxed whitespace-pre-line">{{ info.about_text }}</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-16">
        <div class="bg-blue-50 p-8 rounded-xl shadow-sm border border-blue-100">
            <h2 class="text-2xl font-bold text-blue-900 mb-4 flex items-center">
                <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                Our Vision
            </h2>
            <p class="text-gray-700 whitespace-pre-line">{{ info.vision }}</p>
        </div>
        <div class="bg-green-50 p-8 rounded-xl shadow-sm border border-green-100">
            <h2 class="text-2xl font-bold text-green-900 mb-4 flex items-center">
                <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                Our Mission
            </h2>
            <p class="text-gray-700 whitespace-pre-line">{{ info.mission }}</p>
        </div>
    </div>

    <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-200 flex flex-col md:flex-row gap-8 items-start">
        <div class="w-full md:w-1/3 bg-gray-100 rounded-lg h-64 flex items-center justify-center text-gray-400">
            <svg class="w-20 h-20" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"></path></svg>
        </div>
        <div class="w-full md:w-2/3">
            <h2 class="text-3xl font-bold text-gray-900 mb-2">Message from the HOD</h2>
            <h3 class="text-xl text-cseAccent font-medium mb-6">{{ info.hod_name }}</h3>
            <blockquote class="text-gray-600 italic border-l-4 border-gray-300 pl-4 whitespace-pre-line">
                "{{ info.hod_message }}"
            </blockquote>
        </div>
    </div>

</div>
{% endblock %}
